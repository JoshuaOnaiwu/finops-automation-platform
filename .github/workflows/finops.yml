name: FinOps Cost Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  finops:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::243699833421:role/FinOpsOIDCRole
          aws-region: us-east-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # Generate immutable image tag
      - name: Set Image Tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker image
      - name: Build Docker Image
        run: |
          docker build \
            -t finops-app:$IMAGE_TAG .

      # Tag Docker image
      - name: Tag Docker Image
        run: |
          docker tag \
            finops-app:$IMAGE_TAG \
            243699833421.dkr.ecr.us-east-1.amazonaws.com/finops-app:$IMAGE_TAG

      # Push image to ECR
      - name: Push Docker Image
        run: |
          docker push \
            243699833421.dkr.ecr.us-east-1.amazonaws.com/finops-app:$IMAGE_TAG

      # Install kubectl
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # Install envsubst
      - name: Install gettext
        run: sudo apt-get install -y gettext

      # Configure kubeconfig for EKS
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name finops-cluster

      # Deploy to Kubernetes
      - name: Deploy to Kubernetes
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          envsubst < k8s/deployment.yaml | kubectl apply -f -

          kubectl apply -f k8s/service.yaml

          kubectl rollout status \
            deployment/finops-platform \
            -n finops